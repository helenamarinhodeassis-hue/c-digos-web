<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Card Profissional</title>

<style>
	
body{
	font-family: "Trebuchet MS", Helvetica,sans-serif;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	background-color: #FAF9F5;
}

.card{ background: #D9D1C3;
	padding: 20px;
	width: 250px;
	text-align: center;
	border-radius: 10px;
	box-shadow: 0px 4px 10px rgb(0, 0, 0 / 0.1);

}


.card img{
	width: 100%;
	border-radius: 10px;
}


button{
	background: #D1AB7B;
	color: white;
	border: none;
	padding: 10px;
	margin-top: 10px;
	cursor: pointer;
}


button:hover{
background: #DED457;
}

.card:hover{
	transform:scale(1.05);
	transition: 0.3s;
}

.card h2{
	font-size: 20px;
	margin-bottom: 5px;
}

.competencias{
	color:#8a7f72 ;
	font-size: 14px;
	margin-bottom: 10px;
}

.descricao{
	font-size: 13px;
	color: #555;
	margin-bottom: 15px;
}


</style>








</head>

<body>

<div class="card">
	<img src="https://www.agenciasagarana.com.br/wp-content/uploads/2024/12/captura-de-tela-2024-12-20-134618.png">

<h2>Tristan Aronovich</h2>

<p class="competencias">Ator-Diretor-Produtor</p>

<p class="descricao">Especialista em cinema independente,direção de elenco e storytelling visual.</p>



<button>Projetos</button>
	




</div>


<h1>TESTE GIT</h1>



</body>
</html>
